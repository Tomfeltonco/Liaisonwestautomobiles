kind = "web"
previewPath = "/"
title = "Liaison West Automobiles"
version = "1.0.0"
id = "artifacts/liaison-west"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18472

[services.development]
run = "pnpm --filter @workspace/liaison-west run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/liaison-west", "run", "build" ]
publicDir = "artifacts/liaison-west/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18472"
BASE_PATH = "/"
